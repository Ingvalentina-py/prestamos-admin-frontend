<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear oficina y administrador</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="login-page">
  <div class="login-card">
    <h1>Crear oficina</h1>
    <p>Crea una nueva oficina y su administrador principal para comenzar desde cero.</p>

    <form id="registerForm" class="login-form">
      <div class="field-group">
        <label class="field-label" for="officeName">Nombre de la oficina</label>
        <input type="text" id="officeName" placeholder="Ej. Oficina Centro" required />
      </div>

      <div class="field-group">
        <label class="field-label" for="officeCode">Código de la oficina (opcional)</label>
        <input type="text" id="officeCode" placeholder="Ej. oficina-centro" />
      </div>

      <div class="field-group">
        <label class="field-label" for="name">Nombre del administrador</label>
        <input type="text" id="name" placeholder="Nombre completo" required />
      </div>

      <div class="field-group">
        <label class="field-label" for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="Correo electrónico" required />
      </div>

      <div class="field-group">
        <label class="field-label" for="phone">Teléfono</label>
        <input type="text" id="phone" placeholder="Teléfono" />
      </div>

      <div class="field-group">
        <label class="field-label" for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Contraseña" required />
      </div>

      <button type="submit" class="btn-primary">Crear oficina y administrador</button>
    </form>

    <div id="message" class="message"></div>

    <div style="margin-top: 18px; text-align: center;">
      <a href="login.html" class="small-link">Volver a iniciar sesión</a>
    </div>
  </div>

  <script src="assets/api.js"></script>
  <script>
    const form = document.getElementById("registerForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      message.textContent = "";

      try {
        await apiFetch("/auth/register-admin", {
          method: "POST",
          body: JSON.stringify({
            officeName: document.getElementById("officeName").value.trim(),
            officeCode: document.getElementById("officeCode").value.trim(),
            name: document.getElementById("name").value.trim(),
            email: document.getElementById("email").value.trim(),
            phone: document.getElementById("phone").value.trim(),
            password: document.getElementById("password").value.trim()
          })
        });

        message.textContent = "Oficina y administrador creados correctamente. Ahora puedes iniciar sesión.";
        form.reset();
      } catch (error) {
        message.textContent = error.message;
      }
    });
  </script>
</body>
</html>
