<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Créditos</title>
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <script src="../assets/auth.js"></script>
  <script src="../assets/api.js"></script>
  <script src="../assets/ui.js"></script>
  <script>
    requireRole("collector");

    async function loadPage() {
      const query = new URLSearchParams(window.location.search);
      const q = query.get("q") || "";
      const status = query.get("status") || "all";

      const [clientsData, creditsData] = await Promise.all([
        apiFetch("/clients"),
        apiFetch(`/credits?status=${encodeURIComponent(status)}${q ? `&q=${encodeURIComponent(q)}` : ""}`)
      ]);

      const clients = clientsData.items || [];
      const credits = creditsData.items || [];

      sidebarLayout({
        role: "collector",
        active: "credits",
        title: "Mis créditos",
        subtitle: "Registra créditos y márcalos como pagados cuando corresponda.",
        content: `
          <div class="card" style="margin-bottom:18px;">
            <div class="section-header">
              <div>
                <strong>Registrar crédito</strong>
              </div>
            </div>

            <form id="creditForm" class="form-grid">
              <select id="clientId" required>
                <option value="">Selecciona cliente</option>
                ${clients.map((c) => `<option value="${c._id}">${c.name} · ${c.documentId}</option>`).join("")}
              </select>
              <input type="date" id="originDate" required />
              <input type="date" id="dueDate" required />
              <input type="number" id="principalAmount" placeholder="Monto prestado" required />
              <input type="number" id="totalToPay" placeholder="Monto total a pagar" required />
              <button class="btn-primary" type="submit">Guardar crédito</button>
            </form>
          </div>

          <div class="card">
            <div class="section-header">
              <div>
                <strong>Listado de mis créditos</strong>
              </div>
            </div>

            <form id="filterForm" class="toolbar">
              <input id="searchInput" placeholder="Buscar por cliente o cédula" value="${q}" />
              <select id="statusFilter">
                <option value="all" ${status === "all" ? "selected" : ""}>Todos</option>
                <option value="pending" ${status === "pending" ? "selected" : ""}>Pendientes</option>
                <option value="paid" ${status === "paid" ? "selected" : ""}>Pagados</option>
              </select>
              <button class="btn-muted" type="submit">Aplicar filtro</button>
            </form>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Cliente</th>
                    <th>Cédula</th>
                    <th>Prestado</th>
                    <th>Total a pagar</th>
                    <th>Inicio</th>
                    <th>Pago</th>
                    <th>Estado</th>
                    <th>Acción</th>
                  </tr>
                </thead>
                <tbody>
                  ${credits.length ? credits.map((item) => `
                    <tr>
                      <td>${item.clientId?.name || "-"}</td>
                      <td>${item.clientId?.documentId || "-"}</td>
                      <td>${money(item.principalAmount)}</td>
                      <td>${money(item.totalToPay)}</td>
                      <td>${formatDate(item.originDate)}</td>
                      <td>${formatDate(item.dueDate)}</td>
                      <td>
                        <span class="badge ${item.status}">
                          ${item.status === "paid" ? "Pagado" : "Pendiente"}
                        </span>
                      </td>
                      <td>
                        ${
                          item.status === "pending"
                            ? `<button class="btn-success" onclick="markAsPaid('${item._id}')">Marcar pagado</button>`
                            : "-"
                        }
                      </td>
                    </tr>
                  `).join("") : `
                    <tr>
                      <td colspan="8">No se encontraron créditos.</td>
                    </tr>
                  `}
                </tbody>
              </table>
            </div>
          </div>
        `
      });

      document.getElementById("creditForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        try {
          await apiFetch("/credits", {
            method: "POST",
            body: JSON.stringify({
              clientId: document.getElementById("clientId").value,
              originDate: document.getElementById("originDate").value,
              dueDate: document.getElementById("dueDate").value,
              principalAmount: document.getElementById("principalAmount").value,
              totalToPay: document.getElementById("totalToPay").value
            })
          });

          showToast("Crédito registrado correctamente", "success");
          setTimeout(() => window.location.reload(), 700);
        } catch (error) {
          showToast(error.message, "error");
        }
      });

      document.getElementById("filterForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const value = document.getElementById("searchInput").value.trim();
        const statusValue = document.getElementById("statusFilter").value;
        const params = new URLSearchParams();

        if (value) params.set("q", value);
        if (statusValue) params.set("status", statusValue);

        window.location.href = `credits.html?${params.toString()}`;
      });
    }

    async function markAsPaid(id) {
      try {
        await apiFetch(`/credits/${id}/pay`, {
          method: "PATCH"
        });

        showToast("Crédito marcado como pagado", "success");
        setTimeout(() => window.location.reload(), 700);
      } catch (error) {
        showToast(error.message, "error");
      }
    }

    loadPage().catch((err) => showToast(err.message, "error"));
  </script>
</body>
</html>
