<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cobradores</title>
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <script src="../assets/auth.js"></script>
  <script src="../assets/api.js"></script>
  <script src="../assets/ui.js"></script>
  <script>
    requireRole("admin");

    async function loadCollectors() {
      const data = await apiFetch("/users/collectors");
      return data.items || [];
    }

    async function renderPage() {
      const collectors = await loadCollectors();

      sidebarLayout({
        role: "admin",
        active: "collectors",
        title: "Gestión de cobradores",
        subtitle: "Crea, consulta y habilita o deshabilita cobradores. También puedes vincular tu Telegram.",
        content: `
          <div class="card" style="margin-bottom:18px;">
            <div class="section-header">
              <div>
                <strong>Vincular Telegram</strong>
                <div class="small">
                  Genera un código temporal y envíalo al bot de Telegram para vincular tu cuenta.
                </div>
              </div>
            </div>

            <div class="form-grid">
              <div class="field-group">
                <label class="field-label">Bot de Telegram</label>
                <input value="Loans System Bot" readonly />
              </div>

              <div class="field-group">
                <label class="field-label">Código generado</label>
                <input id="telegramCode" placeholder="Aún no has generado código" readonly />
              </div>

              <div class="field-group">
                <label class="field-label">Vencimiento</label>
                <input id="telegramCodeExpires" placeholder="-" readonly />
              </div>

              <button id="generateTelegramCodeBtn" class="btn-primary" type="button">
                Generar código
              </button>
            </div>

            <div class="small" style="margin-top:12px;">
              Después de generar el código, abre Telegram, entra al bot y envía el código exactamente como aparece.
            </div>
          </div>

          <div class="card" style="margin-bottom:18px;">
            <div class="section-header">
              <div>
                <strong>Nuevo cobrador</strong>
                <div class="small">Completa los datos para registrar un nuevo cobrador.</div>
              </div>
            </div>

            <form id="collectorForm" class="form-grid">
              <div class="field-group">
                <label class="field-label" for="name">Nombre completo</label>
                <input id="name" placeholder="Nombre completo" required />
              </div>

              <div class="field-group">
                <label class="field-label" for="email">Correo electrónico</label>
                <input id="email" placeholder="Correo electrónico" type="email" required />
              </div>

              <div class="field-group">
                <label class="field-label" for="phone">Teléfono</label>
                <input id="phone" placeholder="Teléfono" />
              </div>

              <div class="field-group">
                <label class="field-label" for="password">Contraseña</label>
                <input id="password" placeholder="Contraseña" type="password" required />
              </div>

              <button class="btn-primary" type="submit">Crear cobrador</button>
            </form>
          </div>

          <div class="card">
            <div class="section-header">
              <div>
                <strong>Listado de cobradores</strong>
              </div>
            </div>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Teléfono</th>
                    <th>Estado</th>
                    <th>Acción</th>
                  </tr>
                </thead>
                <tbody>
                  ${collectors.length ? collectors.map((item) => `
                    <tr>
                      <td data-label="Nombre">${item.name}</td>
                      <td data-label="Correo">${item.email}</td>
                      <td data-label="Teléfono">${item.phone || "-"}</td>
                      <td data-label="Estado">${item.isActive ? "Activo" : "Deshabilitado"}</td>
                      <td data-label="Acción">
                        <button class="btn-muted" onclick="toggleCollector('${item._id}', ${!item.isActive})">
                          ${item.isActive ? "Deshabilitar" : "Habilitar"}
                        </button>
                      </td>
                    </tr>
                  `).join("") : `
                    <tr>
                      <td data-label="Resultado">No hay cobradores registrados.</td>
                    </tr>
                  `}
                </tbody>
              </table>
            </div>
          </div>
        `
      });

      document.getElementById("generateTelegramCodeBtn").addEventListener("click", generateTelegramCode);

      document.getElementById("collectorForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        try {
          await apiFetch("/users/collectors", {
            method: "POST",
            body: JSON.stringify({
              name: document.getElementById("name").value.trim(),
              email: document.getElementById("email").value.trim(),
              phone: document.getElementById("phone").value.trim(),
              password: document.getElementById("password").value.trim()
            })
          });

          showToast("Cobrador creado correctamente", "success");
          setTimeout(() => window.location.reload(), 700);
        } catch (error) {
          showToast(error.message, "error");
        }
      });
    }

    async function generateTelegramCode() {
      const btn = document.getElementById("generateTelegramCodeBtn");
      const codeInput = document.getElementById("telegramCode");
      const expiresInput = document.getElementById("telegramCodeExpires");

      btn.disabled = true;
      btn.textContent = "Generando...";

      try {
        const data = await apiFetch("/telegram/link-code", {
          method: "POST"
        });

        codeInput.value = data.code;
        expiresInput.value = data.expiresAt
          ? new Date(data.expiresAt).toLocaleString("es-CO")
          : "-";

        showToast("Código generado correctamente", "success");
      } catch (error) {
        showToast(error.message, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Generar código";
      }
    }

    async function toggleCollector(id, isActive) {
      try {
        await apiFetch(`/users/collectors/${id}/active`, {
          method: "PATCH",
          body: JSON.stringify({ isActive })
        });

        showToast("Estado del cobrador actualizado", "success");
        setTimeout(() => window.location.reload(), 700);
      } catch (error) {
        showToast(error.message, "error");
      }
    }

    renderPage().catch((err) => showToast(err.message, "error"));
  </script>
</body>
</html>
