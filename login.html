<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Préstamos</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="login-page">
  <div class="login-card">
    <h1>Sistema de Préstamos</h1>
    <p>Ingresa para administrar clientes, cobradores y créditos de forma simple y segura.</p>

    <form id="loginForm" class="login-form">
      <input type="email" id="email" placeholder="Correo electrónico" required />
      <input type="password" id="password" placeholder="Contraseña" required />
      <button type="submit" class="btn-primary">Iniciar sesión</button>
    </form>

    <div id="message" class="message"></div>

    <div style="margin-top: 18px; text-align: center;">
      <a href="register-admin.html" class="small-link">Crear administrador</a>
    </div>
  </div>

  <script src="assets/api.js"></script>
  <script>
    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      message.textContent = "";

      try {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        const data = await apiFetch("/auth/login", {
          method: "POST",
          body: JSON.stringify({ email, password })
        });

        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));

        if (data.user.role === "admin") {
          window.location.href = "admin/dashboard.html";
        } else {
          window.location.href = "collector/dashboard.html";
        }
      } catch (error) {
        message.textContent = error.message;
      }
    });
  </script>
</body>
</html>
