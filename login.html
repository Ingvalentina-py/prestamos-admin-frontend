<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso Administrador</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="login-page">
  <div class="login-card">
    <h1>Acceso Administrador</h1>
    <p>Selecciona tu oficina e ingresa para gestionar cobradores, clientes y créditos.</p>

    <form id="loginForm" class="login-form">
      <div class="field-group">
        <label class="field-label" for="officeId">Oficina</label>
        <select id="officeId" required>
          <option value="">Selecciona una oficina</option>
        </select>
      </div>

      <input type="email" id="email" placeholder="Correo electrónico" required />
      <input type="password" id="password" placeholder="Contraseña" required />
      <button type="submit" class="btn-primary">Ingresar como administrador</button>
    </form>

    <div id="message" class="message"></div>

    <div style="margin-top: 18px; text-align: center;">
      <a href="register-admin.html" class="small-link">Crear oficina y administrador</a>
    </div>
  </div>

  <script src="assets/api.js"></script>
  <script>
    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");
    const officeSelect = document.getElementById("officeId");

    async function loadOffices() {
      try {
        const data = await apiFetch("/offices/public");
        const items = data.items || [];

        officeSelect.innerHTML = `
          <option value="">Selecciona una oficina</option>
          ${items.map(item => `<option value="${item._id}">${item.name}</option>`).join("")}
        `;
      } catch (error) {
        message.textContent = error.message;
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      message.textContent = "";

      try {
        const officeId = document.getElementById("officeId").value;
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        const data = await apiFetch("/auth/login", {
          method: "POST",
          body: JSON.stringify({ officeId, email, password })
        });

        if (data.user.role !== "admin") {
          message.textContent = "Este acceso es solo para administradores.";
          return;
        }

        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));

        window.location.href = "admin/dashboard.html";
      } catch (error) {
        message.textContent = error.message;
      }
    });

    loadOffices();
  </script>
</body>
</html>
